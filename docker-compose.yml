services:
  app:
    build: .
    container_name: app
    ports:
      - 3000:3000
    volumes:
      - ./:/app
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - app-nest
  postgres:
    container_name: postgres-nest
    image: postgres:17.9-trixie
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./.docker/pgData:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-nest
    ports:
      - 5432:5432
networks:
  app-nest:
    driver: bridge
