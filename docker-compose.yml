services:
  app:
    build:
      context: .
      args:
        - PORT=${PORT}
    container_name: app
    env_file:
      - .env
    ports:
      - ${PORT}:${PORT}
    restart: unless-stopped
    command: ["/bin/sh", "-c", "sleep 10 && npm run start:prod"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-nest

  postgres:
    container_name: postgres-nest
    image: postgres:17.9-trixie
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgData:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-nest
    ports:
      - ${DB_PORT}:${DB_PORT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      retries: 5
networks:
  app-nest:
    driver: bridge

volumes:
  pgData:
    driver: local
